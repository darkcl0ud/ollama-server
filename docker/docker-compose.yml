networks:
  services:
    driver: bridge
    internal: true
    name: services
    ipam:
      config:
        - subnet: 10.0.1.0/24
  dmz:
    driver: bridge
    name: dmz
    ipam:
      config:
        - subnet: 10.0.0.0/24
  level0:
    driver: bridge
    name: level0
    ipam:
      config:
        - subnet: 10.0.254.0/24
services:
  nginx:
    container_name: nginx
    image: nginx:stable-alpine
    mem_limit: 512mb
    networks:
      services:
        ipv4_address: 10.0.1.2
      dmz:
        ipv4_address: 10.0.0.2
        aliases:
          - chat.internal
    restart: always
    volumes:
      - ./inbound.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - host.docker.internal:0.0.0.0 # Removes auto addition for Docker Desktop
  ollama-access-proxy:
    container_name: ollama-access-proxy
    image: nginx:stable-alpine
    mem_limit: 512mb
    networks:
      services:
        ipv4_address: 10.0.1.254
      level0:
        ipv4_address: 10.0.254.254
    restart: always
    volumes:
      - ./ollama-access.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - host.docker.internal:host-gateway # Adds for Docker linux
  openwebui:
    container_name: openwebui
    image: ghcr.io/open-webui/open-webui:main
    networks:
      services:
        ipv4_address: 10.0.1.3
    volumes:
      - open-webui:/app/backend/data
    environment:
      WEBUI_URL: http://chat.internal
      OLLAMA_BASE_URL: http://ollama-access-proxy:11434
    restart: always
    mem_limit: 2gb
  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest-arm64
    networks:
      dmz:
        ipv4_address: 10.0.0.4
    command: tunnel run
    restart: unless-stopped
    env_file:
      - ../secrets/.env
    mem_limit: 512mb
    extra_hosts:
      - host.docker.internal:0.0.0.0 # Removes auto addition for Docker Desktop
    # secrets:
    #   - cf_tunnel_token
volumes:
  open-webui: {}
