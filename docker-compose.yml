networks:
  services:
    driver: bridge
    internal: true
    name: services
    ipam:
      config:
        - subnet: 10.0.1.0/24
  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
services:
  nginx:
    container_name: nginx
    image: nginx:stable-alpine
    networks:
      services:
        ipv4_address: 10.0.1.2
      dmz:
        ipv4_address: 10.0.0.2
    ports:
      - "80:80"
    restart: always
    volumes:
      - ./inbound.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - host.docker.internal:0.0.0.0 # Removes auto addition for Docker Desktop
  ollama-access-proxy:
    container_name: ollama-access-proxy
    image: nginx:stable-alpine
    networks:
      services:
        ipv4_address: 10.0.1.254
      dmz:
        ipv4_address: 10.0.0.254
    restart: always
    volumes:
      - ./ollama-access.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - host.docker.internal:host-gateway # Adds for Docker linux
  openwebui:
    container_name: openwebui
    image: ghcr.io/open-webui/open-webui:main
    networks:
      services:
        ipv4_address: 10.0.1.3
    volumes:
      - open-webui:/app/backend/data
    environment:
      WEBUI_URL: http://localhost:80
      OLLAMA_BASE_URL: http://ollama-access-proxy:11434
    restart: always
volumes:
  open-webui: {}